<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>P1 – Méint</title>

<style>
@font-face{
  font-family:'Schoulschrëft';
  src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype');
  font-weight:bold; font-style:normal; font-display:swap;
}

:root{
  --pink-mid:#e4b7d0;
  --pink-light:#f6e4ee;
  --pink-dark:#d88cb8;

  --ink:#1f1f1f;
  --white:#fff;
  --bad:#ffcccc;
  --ok:#b7f0c8;

  --border:3px;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --pad:clamp(10px,2.2vw,16px);
  --r:18px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none;}
html,body{
  height:100%; margin:0;
  background:linear-gradient(135deg,var(--pink-mid),var(--pink-light));
  color:var(--ink);
  font-family:'Schoulschrëft', Arial, sans-serif;
}

.hidden{display:none!important;}

/* ===== top nav ===== */
.top{
  position:sticky; top:8px; z-index:10;
  display:flex; gap:10px; justify-content:center; align-items:center;
  background:var(--white);
  border:var(--border) solid var(--pink-dark);
  border-radius:16px;
  padding:.28rem .7rem;
  margin:10px auto;
  width:fit-content;
  box-shadow:var(--shadow);
}
.iconBtn{
  border:var(--border) solid var(--ink);
  background:var(--white);
  padding:.2rem .55rem;
  border-radius:12px;
  cursor:pointer;
  font-size:1.25rem;
  line-height:1;
  min-width:2.35rem;
  display:grid;
  place-items:center;
  font-family:'Schoulschrëft', Arial, sans-serif;
}
.iconBtn:active{transform:scale(.98);}
#flowLabel{font-size:1.05rem; opacity:.9;}

/* ===== sections ===== */
.wrap{
  min-height:calc(100vh - 70px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.1rem;
  padding:var(--pad);
}
h1{
  margin:.2rem 0;
  text-align:center;
  font-size:clamp(1.6rem,3.8vw,2.6rem);
}

/* ===== text token layouts ===== */
.wordGrid{
  width:min(1200px,96vw);
  display:grid;
  gap:clamp(.8rem,1.8vw,1.2rem);
  justify-items:center;
  align-items:stretch;
  grid-template-columns:repeat(4, minmax(150px,1fr));
  margin-top:clamp(10px,2vh,22px);
}
@media (max-width:900px){
  .wordGrid{grid-template-columns:repeat(3, minmax(130px,1fr));}
}
@media (max-width:620px){
  .wordGrid{grid-template-columns:repeat(2, minmax(130px,1fr));}
}

.wordToken{
  width:100%;
  min-height:92px;
  background:var(--white);
  border:5px solid var(--pink-mid);
  border-radius:22px;
  display:grid;
  place-items:center;
  cursor:pointer;
  transition:transform .08s ease;
  box-shadow:var(--shadow);
  padding:.7rem;
  text-align:center;
  font-size:clamp(1.2rem,2.7vw,1.8rem);
  line-height:1.05;
}
.wordToken:active{transform:scale(.97);}

.flash-good{filter:drop-shadow(0 0 0.55rem rgba(71,190,110,.65));}
.flash-bad{filter:drop-shadow(0 0 0.55rem rgba(255,90,90,.6));}

.btn{
  border:var(--border) solid var(--ink);
  background:var(--white);
  border-radius:14px;
  padding:.4rem .85rem;
  cursor:pointer;
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:1.05rem;
  box-shadow:var(--shadow);
}
.btn:active{transform:scale(.98);}

/* ===== memory ===== */
.memGrid{
  width:min(980px,96vw);
  display:grid;
  gap:clamp(.6rem,1.8vw,1rem);
  grid-template-columns:repeat(4, minmax(0, 1fr));
}
@media (max-width:780px){ .memGrid{grid-template-columns:repeat(3,1fr);} }
@media (max-width:520px){ .memGrid{grid-template-columns:repeat(2,1fr);} }

.card{aspect-ratio:5/3; perspective:1000px; cursor:pointer;}
.inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .28s ease;}
.flipped .inner{transform:rotateY(180deg);}
.face{
  position:absolute; inset:0;
  border-radius:16px;
  border:5px solid var(--pink-mid);
  background:#fff;
  display:grid;
  place-items:center;
  backface-visibility:hidden;
  box-shadow:var(--shadow);
}
.front{
  background:#fff url('https://i.postimg.cc/ZKkYXy7g/cardback-p1-game.png') center/68% no-repeat;
}
.back{transform:rotateY(180deg);}
.memWord{
  font-size:clamp(1.1rem,3vmin,1.6rem);
  text-align:center;
  padding:.4rem;
  line-height:1.12;
}
.memSoundBtn{
  width:min(70%,120px);
  height:auto;
  object-fit:contain;
  display:block;
}

/* ===== order ===== */
.orderSlots{
  width:min(1200px,96vw);
  display:grid;
  gap:clamp(.55rem,1.6vw,1rem);
  grid-template-columns:repeat(4,minmax(0,1fr));
}
@media (max-width:700px){
  .orderSlots{grid-template-columns:repeat(2,minmax(0,1fr));}
}

.orderBank{
  width:min(1200px,96vw);
  display:grid;
  gap:clamp(.55rem,1.6vw,1rem);
  grid-template-columns:repeat(4,minmax(0,1fr));
}
@media (max-width:700px){
  .orderBank{grid-template-columns:repeat(2,minmax(0,1fr));}
}

.orderSlot,
.orderBankItem{
  min-height:92px;
  background:var(--white);
  border-radius:18px;
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow:var(--shadow);
  text-align:center;
  padding:.6rem;
  font-size:clamp(1.1rem,2.5vw,1.55rem);
  line-height:1.08;
}
.orderSlot{border:5px dashed var(--pink-mid);}
.orderBankItem{border:5px solid var(--pink-mid);}

/* ===== seasons ===== */
.seasonWrap{
  width:min(1280px,98vw);
  display:grid;
  grid-template-columns:repeat(2,minmax(280px,1fr));
  gap:clamp(.8rem,1.8vw,1.2rem);
}
@media (max-width:760px){
  .seasonWrap{grid-template-columns:1fr;}
}
.seasonBox{
  background:rgba(255,255,255,.72);
  border:5px solid var(--pink-dark);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:1rem;
}
.seasonTitle{
  text-align:center;
  font-size:clamp(1.35rem,3vw,1.9rem);
  margin-bottom:.8rem;
}
.seasonSlots{
  display:grid;
  gap:.7rem;
  grid-template-columns:repeat(3,minmax(0,1fr));
}
@media (max-width:520px){
  .seasonSlots{grid-template-columns:1fr;}
}
.seasonSlot{
  min-height:86px;
  background:var(--white);
  border:5px dashed var(--pink-mid);
  border-radius:18px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:.55rem;
  cursor:pointer;
  box-shadow:var(--shadow);
  font-size:clamp(1.05rem,2.3vw,1.45rem);
  line-height:1.08;
}
.monthBank{
  width:min(1100px,96vw);
  display:grid;
  gap:clamp(.55rem,1.6vw,1rem);
  grid-template-columns:repeat(4,minmax(0,1fr));
}
@media (max-width:800px){
  .monthBank{grid-template-columns:repeat(3,minmax(0,1fr));}
}
@media (max-width:520px){
  .monthBank{grid-template-columns:repeat(2,minmax(0,1fr));}
}
.monthBankItem{
  min-height:86px;
  background:var(--white);
  border:5px solid var(--pink-mid);
  border-radius:18px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:.55rem;
  cursor:pointer;
  box-shadow:var(--shadow);
  font-size:clamp(1.05rem,2.3vw,1.45rem);
  line-height:1.08;
}
</style>
</head>

<body>

<div class="top">
  <button class="iconBtn" id="prev" aria-label="virdrun">◀</button>
  <span id="flowLabel">1. Spill</span>
  <button class="iconBtn" id="next" aria-label="nächst">▶</button>
</div>

<!-- GAME 1 -->
<section class="wrap" id="g1">
  <h1>Lauschter a klick</h1>
  <div class="wordGrid" id="grid1"></div>
  <button class="btn" id="play1">Toun nach eng Kéier</button>
</section>

<!-- GAME 2 -->
<section class="wrap hidden" id="g2">
  <h1>Memory</h1>
  <div class="memGrid" id="memGrid"></div>
  <button class="btn" id="memReset">↻ Reset</button>
</section>

<!-- GAME 3 -->
<section class="wrap hidden" id="g3">
  <h1>Setz d'Méint an déi richteg Reiefolleg</h1>
  <div class="orderSlots" id="orderSlots"></div>
  <div class="orderBank" id="orderBank"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn" id="orderReset">↻ Reset</button>
    <button class="btn" id="orderCheck">Kontrolléieren</button>
  </div>
</section>

<!-- GAME 4 -->
<section class="wrap hidden" id="g4">
  <h1>Setz d'Méint an déi richteg Joreszäit</h1>
  <div class="seasonWrap" id="seasonWrap"></div>
  <div class="monthBank" id="seasonBank"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn" id="seasonReset">↻ Reset</button>
    <button class="btn" id="seasonCheck">Kontrolléieren</button>
  </div>
</section>

<audio id="speaker" preload="auto"></audio>

<script>
const AUDIO_BASE = "https://github.com/albrechtclaire1007/p1meint/raw/refs/heads/main/";

const ITEMS = [
  { id:'januar',    word:'Januar',    audio:'p1_januar.mp3',    season:'wanter' },
  { id:'februar',   word:'Februar',   audio:'p1_februar.mp3',   season:'wanter' },
  { id:'maerz',     word:'Mäerz',     audio:'p1_maerz.mp3',     season:'freijoer' },
  { id:'abrell',    word:'Abrëll',    audio:'p1_abrell.mp3',    season:'freijoer' },
  { id:'mee',       word:'Mee',       audio:'p1_mee.mp3',       season:'freijoer' },
  { id:'juni',      word:'Juni',      audio:'p1_juni.mp3',      season:'summer' },
  { id:'juli',      word:'Juli',      audio:'p1_juli.mp3',      season:'summer' },
  { id:'august',    word:'August',    audio:'p1_august.mp3',    season:'summer' },
  { id:'september', word:'September', audio:'p1_september.mp3', season:'hierscht' },
  { id:'oktober',   word:'Oktober',   audio:'p1_oktober.mp3',   season:'hierscht' },
  { id:'november',  word:'November',  audio:'p1_november.mp3',  season:'hierscht' },
  { id:'dezember',  word:'Dezember',  audio:'p1_dezember.mp3',  season:'wanter' }
];

const SEASONS = [
  { id:'freijoer', word:'Fréijoer' },
  { id:'summer',   word:'Summer' },
  { id:'hierscht', word:'Hierscht' },
  { id:'wanter',   word:'Wanter' }
];

const speaker = document.getElementById('speaker');

function playAudio(filename){
  if(!filename) return Promise.resolve();
  const src = AUDIO_BASE + filename;
  return new Promise(resolve=>{
    try{
      speaker.pause();
      speaker.currentTime = 0;
      speaker.src = src;
      const done = ()=>{
        speaker.removeEventListener('ended', done);
        speaker.removeEventListener('error', done);
        resolve();
      };
      speaker.addEventListener('ended', done, {once:true});
      speaker.addEventListener('error', done, {once:true});
      const p = speaker.play();
      if(p && typeof p.then === 'function') p.catch(()=>resolve());
    }catch(e){
      resolve();
    }
  });
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function flash(el, ok=true){
  el.classList.remove('flash-good','flash-bad');
  void el.offsetWidth;
  el.classList.add(ok ? 'flash-good' : 'flash-bad');
  setTimeout(()=>el.classList.remove('flash-good','flash-bad'), 280);
}

/* ================= NAV ================= */
const pages = ['g1','g2','g3','g4'];
let p = 0;

document.getElementById('prev').onclick = ()=>show(p-1);
document.getElementById('next').onclick = ()=>show(p+1);

function show(i){
  p = Math.max(0, Math.min(pages.length-1, i));
  pages.forEach((id,n)=>document.getElementById(id).classList.toggle('hidden', n !== p));
  document.getElementById('flowLabel').textContent = (p+1) + '. Spill';
}
show(0);

/* ================= GAME 1 ================= */
const grid1 = document.getElementById('grid1');
let g1bag = [];
let g1target = null;

function initG1(){
  grid1.innerHTML = '';
  shuffle(ITEMS).forEach(it=>{
    const b = document.createElement('div');
    b.className = 'wordToken';
    b.textContent = it.word;
    b.onclick = ()=>{
      if(!g1target) return;
      const ok = it.id === g1target.id;
      flash(b, ok);
      if(ok) setTimeout(nextG1, 280);
    };
    grid1.appendChild(b);
  });
  g1bag = shuffle(ITEMS);
  nextG1();
}

function nextG1(){
  if(g1bag.length === 0) g1bag = shuffle(ITEMS);
  g1target = g1bag.pop();
  playAudio(g1target.audio);
}

document.getElementById('play1').onclick = ()=>g1target && playAudio(g1target.audio);
initG1();

/* ================= GAME 2 ================= */
const memGrid = document.getElementById('memGrid');
const memReset = document.getElementById('memReset');
let memFirst = null;
let memLock = false;
let memMatched = 0;

function buildMemory(){
  memGrid.innerHTML = '';
  memFirst = null;
  memLock = false;
  memMatched = 0;

  const base = shuffle(ITEMS).slice(0, Math.min(8, ITEMS.length));
  const deck = shuffle(base.flatMap(it=>[
    { key:it.id, type:'sound', it },
    { key:it.id, type:'word', it }
  ]));

  deck.forEach(c=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.key = c.key;
    card.dataset.type = c.type;

    const backContent = (c.type === 'sound')
      ? `<img src="https://i.postimg.cc/8cYkK9CZ/p1lauschter.png" class="memSoundBtn" alt="">`
      : `<div class="memWord">${c.it.word}</div>`;

    card.innerHTML = `
      <div class="inner">
        <div class="face front"></div>
        <div class="face back">${backContent}</div>
      </div>
    `;

    card.onclick = ()=>flipCard(card, c);
    memGrid.appendChild(card);
  });
}

function flipCard(card, c){
  if(memLock) return;
  if(card.classList.contains('matched')) return;
  if(card.classList.contains('flipped')) return;

  card.classList.add('flipped');

  if(c.type === 'sound') playAudio(c.it.audio);

  if(!memFirst){
    memFirst = { card, c };
    return;
  }

  memLock = true;
  const a = memFirst;
  const b = { card, c };
  const isMatch = a.c.key === b.c.key && a.c.type !== b.c.type;

  if(isMatch){
    a.card.classList.add('matched');
    b.card.classList.add('matched');
    memMatched++;
    memFirst = null;
    memLock = false;
  }else{
    setTimeout(()=>{
      a.card.classList.remove('flipped');
      b.card.classList.remove('flipped');
      memFirst = null;
      memLock = false;
    }, 650);
  }
}

memReset.onclick = buildMemory;
buildMemory();

/* ================= GAME 3 ================= */
const orderSlots = document.getElementById('orderSlots');
const orderBank = document.getElementById('orderBank');
const orderReset = document.getElementById('orderReset');
const orderCheck = document.getElementById('orderCheck');

let selectedOrderItem = null;
let placedOrder = new Array(ITEMS.length).fill(null);
let bankOrder = [];

function buildOrder(){
  selectedOrderItem = null;
  placedOrder = new Array(ITEMS.length).fill(null);
  bankOrder = shuffle(ITEMS);

  orderSlots.innerHTML = '';
  orderBank.innerHTML = '';

  ITEMS.forEach((_, idx)=>{
    const slot = document.createElement('div');
    slot.className = 'orderSlot';
    slot.dataset.idx = idx;
    slot.innerHTML = `<div style="font-size:1.3rem;opacity:.45;">${idx+1}</div>`;
    slot.onclick = ()=>{
      const i = Number(slot.dataset.idx);
      if(placedOrder[i]){
        const backItem = placedOrder[i];
        placedOrder[i] = null;
        selectedOrderItem = backItem;
        renderOrderBank();
        renderOrderSlots();
      }else if(selectedOrderItem){
        placedOrder[i] = selectedOrderItem;
        selectedOrderItem = null;
        renderOrderBank();
        renderOrderSlots();
      }
    };
    orderSlots.appendChild(slot);
  });

  renderOrderBank();
  renderOrderSlots();
}

function renderOrderBank(){
  orderBank.innerHTML = '';
  const remaining = bankOrder.filter(it=>!placedOrder.some(p=>p && p.id === it.id));
  remaining.forEach(it=>{
    const b = document.createElement('div');
    b.className = 'orderBankItem';
    b.style.borderColor = selectedOrderItem && selectedOrderItem.id === it.id ? 'var(--pink-dark)' : 'var(--pink-mid)';
    b.textContent = it.word;
    b.onclick = ()=>{
      selectedOrderItem = it;
      playAudio(it.audio);
      renderOrderBank();
    };
    orderBank.appendChild(b);
  });
}

function renderOrderSlots(){
  [...orderSlots.children].forEach((slot, idx)=>{
    const it = placedOrder[idx];
    if(it){
      slot.style.borderStyle = 'solid';
      slot.textContent = it.word;
      slot.onclick = ()=>{
        selectedOrderItem = it;
        placedOrder[idx] = null;
        renderOrderBank();
        renderOrderSlots();
        playAudio(it.audio);
      };
    }else{
      slot.style.borderStyle = 'dashed';
      slot.innerHTML = `<div style="font-size:1.3rem;opacity:.45;">${idx+1}</div>`;
      slot.onclick = ()=>{
        if(selectedOrderItem){
          placedOrder[idx] = selectedOrderItem;
          selectedOrderItem = null;
          renderOrderBank();
          renderOrderSlots();
        }
      };
    }
  });
}

orderReset.onclick = buildOrder;
orderCheck.onclick = ()=>{
  let allOk = true;
  [...orderSlots.children].forEach((slot, idx)=>{
    const ok = placedOrder[idx] && placedOrder[idx].id === ITEMS[idx].id;
    flash(slot, !!ok);
    if(!ok) allOk = false;
  });
  if(allOk) setTimeout(buildOrder, 650);
};
buildOrder();

/* ================= GAME 4 ================= */
const seasonWrap = document.getElementById('seasonWrap');
const seasonBank = document.getElementById('seasonBank');
const seasonReset = document.getElementById('seasonReset');
const seasonCheck = document.getElementById('seasonCheck');

let selectedSeasonItem = null;
let seasonPlaced = {};
let seasonBankItems = [];

function buildSeasonGame(){
  selectedSeasonItem = null;
  seasonPlaced = {};
  SEASONS.forEach(s=>{
    seasonPlaced[s.id] = [null, null, null];
  });
  seasonBankItems = shuffle(ITEMS);

  seasonWrap.innerHTML = '';
  seasonBank.innerHTML = '';

  SEASONS.forEach(season=>{
    const box = document.createElement('div');
    box.className = 'seasonBox';
    box.innerHTML = `
      <div class="seasonTitle">${season.word}</div>
      <div class="seasonSlots" id="slots-${season.id}"></div>
    `;
    seasonWrap.appendChild(box);

    const slotsEl = box.querySelector('.seasonSlots');
    for(let i=0;i<3;i++){
      const slot = document.createElement('div');
      slot.className = 'seasonSlot';
      slot.dataset.season = season.id;
      slot.dataset.idx = i;
      slot.innerHTML = `<div style="font-size:1.1rem;opacity:.35;">+</div>`;
      slot.onclick = ()=>{
        const sid = slot.dataset.season;
        const idx = Number(slot.dataset.idx);
        if(seasonPlaced[sid][idx]){
          const backItem = seasonPlaced[sid][idx];
          seasonPlaced[sid][idx] = null;
          selectedSeasonItem = backItem;
          renderSeasonSlots();
          renderSeasonBank();
        }else if(selectedSeasonItem){
          seasonPlaced[sid][idx] = selectedSeasonItem;
          selectedSeasonItem = null;
          renderSeasonSlots();
          renderSeasonBank();
        }
      };
      slotsEl.appendChild(slot);
    }
  });

  renderSeasonSlots();
  renderSeasonBank();
}

function renderSeasonBank(){
  seasonBank.innerHTML = '';
  const usedIds = Object.values(seasonPlaced).flat().filter(Boolean).map(x=>x.id);
  const remaining = seasonBankItems.filter(it=>!usedIds.includes(it.id));

  remaining.forEach(it=>{
    const b = document.createElement('div');
    b.className = 'monthBankItem';
    b.style.borderColor = selectedSeasonItem && selectedSeasonItem.id === it.id ? 'var(--pink-dark)' : 'var(--pink-mid)';
    b.textContent = it.word;
    b.onclick = ()=>{
      selectedSeasonItem = it;
      playAudio(it.audio);
      renderSeasonBank();
    };
    seasonBank.appendChild(b);
  });
}

function renderSeasonSlots(){
  SEASONS.forEach(season=>{
    const container = document.getElementById('slots-' + season.id);
    [...container.children].forEach((slot, idx)=>{
      const it = seasonPlaced[season.id][idx];
      if(it){
        slot.style.borderStyle = 'solid';
        slot.textContent = it.word;
        slot.onclick = ()=>{
          selectedSeasonItem = it;
          seasonPlaced[season.id][idx] = null;
          renderSeasonSlots();
          renderSeasonBank();
          playAudio(it.audio);
        };
      }else{
        slot.style.borderStyle = 'dashed';
        slot.innerHTML = `<div style="font-size:1.1rem;opacity:.35;">+</div>`;
        slot.onclick = ()=>{
          if(selectedSeasonItem){
            seasonPlaced[season.id][idx] = selectedSeasonItem;
            selectedSeasonItem = null;
            renderSeasonSlots();
            renderSeasonBank();
          }
        };
      }
    });
  });
}

seasonReset.onclick = buildSeasonGame;
seasonCheck.onclick = ()=>{
  let allOk = true;
  SEASONS.forEach(season=>{
    const container = document.getElementById('slots-' + season.id);
    [...container.children].forEach((slot, idx)=>{
      const it = seasonPlaced[season.id][idx];
      const ok = !!it && it.season === season.id;
      flash(slot, ok);
      if(!ok) allOk = false;
    });
  });
  if(allOk) setTimeout(buildSeasonGame, 700);
};

buildSeasonGame();
</script>

</body>
</html>
